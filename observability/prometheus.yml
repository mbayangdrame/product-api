global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'product-api'
    metrics_path: '/l3gl/actuator/prometheus'
    static_configs:
      - targets: ['16.170.164.152:31598']  # Remplacez par l'IP de VM1 et le NodePort
    scrape_interval: 10s
    scrape_timeout: 5s